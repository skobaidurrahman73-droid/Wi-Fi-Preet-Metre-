<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Speed Test - Smooth Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0b0f1a; 
            text-align: center; margin: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .container { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            padding: 30px; border-radius: 35px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            width: 90%; max-width: 420px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.2); object-fit: cover; }
        
        .graph-container { 
            width: 100%; height: 160px; 
            background: rgba(0, 0, 0, 0.2); 
            border-radius: 20px; padding: 10px; 
            box-sizing: border-box; margin-top: 10px;
        }

        .dots-wrapper {
            display: flex; justify-content: center; gap: 8px; margin: 20px 0;
        }
        .dot { width: 10px; height: 10px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; transition: 0.4s; }
        .dot.active-red { background: #ff4757; box-shadow: 0 0 10px #ff4757; }
        .dot.active-yellow { background: #ffa502; box-shadow: 0 0 10px #ffa502; }
        .dot.active-green { background: #2ed573; box-shadow: 0 0 10px #2ed573; }

        .stats { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .stat-box { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 15px; border-radius: 18px; width: 48%; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-box h3 { margin: 0; font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        
        /* স্পিড টেক্সট - যা স্মুথলি পরিবর্তন হবে */
        .speed-text { 
            margin: 8px 0 0; font-size: 26px; font-weight: 700; color: #fff; 
            transition: color 0.3s ease;
        }

        button { 
            background: #3b82f6; color: white; border: none; padding: 16px; 
            font-size: 15px; border-radius: 15px; cursor: pointer; font-weight: 600; 
            transition: 0.3s; text-transform: uppercase; width: 100%;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .ad-box { margin-top: 25px; border-radius: 15px; overflow: hidden; height: 100px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

<div class="container">
    <img src="https://raw.githubusercontent.com/আপনার_ইউজারনেম/আপনার_রিপোজিটরি/main/Cyber-hacker-anonymous-logo-vector-50369664.jpg" alt="Logo" class="logo">
    
    <div class="graph-container">
        <canvas id="speedChart"></canvas>
    </div>

    <div class="dots-wrapper" id="dotsContainer">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="stats">
        <div class="stat-box">
            <h3>Download</h3>
            <div id="down-text" class="speed-text">0.0</div>
        </div>
        <div class="stat-box">
            <h3>Upload</h3>
            <div id="up-text" class="speed-text">0.0</div>
        </div>
    </div>

    <button id="startBtn" onclick="runTest()">Start Test</button>

    <div class="ad-box">
        <iframe src="https://omg10.com/4/10527852" frameborder="0" width="100%" height="100%"></iframe>
    </div>
</div>

<script>
let speedChart;
const ctx = document.getElementById('speedChart').getContext('2d');

function initChart() {
    if(speedChart) speedChart.destroy();
    let grad = ctx.createLinearGradient(0, 0, 0, 150);
    grad.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
    grad.addColorStop(1, 'rgba(59, 130, 246, 0)');

    speedChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(30).fill(''),
            datasets: [{
                data: Array(30).fill(0),
                borderColor: '#3b82f6',
                borderWidth: 3,
                fill: true,
                backgroundColor: grad,
                tension: 0.5,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            animation: { duration: 400 },
            scales: { y: { display: false, min: 0, max: 100 }, x: { display: false } },
            plugins: { legend: { display: false } }
        }
    });
}

initChart();

// সংখ্যা স্মুথলি পরিবর্তন করার ফাংশন
function animateNumber(elementId, start, end, duration, updateDotsFlag = false) {
    let obj = document.getElementById(elementId);
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        const currentVal = (progress * (end - start) + start).toFixed(1);
        obj.innerText = currentVal;
        
        // কালার লজিক
        if (currentVal >= 30) obj.style.color = "#2ed573";
        else if (currentVal >= 10) obj.style.color = "#ffa502";
        else obj.style.color = "#ff4757";

        if(updateDotsFlag) refreshDots(currentVal);

        if (progress < 1) {
            window.requestAnimationFrame(step);
        }
    };
    window.requestAnimationFrame(step);
}

function refreshDots(speed) {
    const dots = document.querySelectorAll('.dot');
    dots.forEach(d => d.className = 'dot');
    let count = Math.min(Math.ceil(speed / 10), 10);
    for (let i = 0; i < count; i++) {
        if (i < 3) dots[i].classList.add('active-red');
        else if (i < 6) dots[i].classList.add('active-yellow');
        else dots[i].classList.add('active-green');
    }
}

function runTest() {
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerText = "Scanning...";
    
    // রিসেট
    document.getElementById('down-text').innerText = "0.0";
    document.getElementById('up-text').innerText = "0.0";
    refreshDots(0);

    let i = 0;
    const interval = setInterval(() => {
        let val = (Math.random() * 30 + 20).toFixed(1);
        speedChart.data.datasets[0].data.shift();
        speedChart.data.datasets[0].data.push(val);
        speedChart.update('none');

        i++;
        if(i > 20) {
            clearInterval(interval);
            
            // রেজাল্ট আসার সময় স্মুথ অ্যানিমেশন
            let finalDown = (Math.random() * 40 + 40).toFixed(1);
            let finalUp = (Math.random() * 20 + 10).toFixed(1);
            
            animateNumber("down-text", 0, finalDown, 1500, true);
            
            setTimeout(() => {
                animateNumber("up-text", 0, finalUp, 1500, false);
                btn.disabled = false;
                btn.innerText = "Start Again";
            }, 800);
        }
    }, 120);
}
</script>

</body>
</html>
